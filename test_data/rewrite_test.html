<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Humanizer Rewrite Test</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      margin: 0;
      padding: 32px;
      background: #f8fafc;
      color: #1a1a2e;
    }
    h1 { font-size: 20px; margin-bottom: 8px; }
    p { color: #4a5568; margin-top: 0; }
    #editor {
      min-height: 160px;
      padding: 20px;
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      font-size: 18px;
      line-height: 1.5;
      outline: none;
    }
  </style>
</head>
<body>
  <h1>Humanizer rewrite test</h1>
  <p>Select at least three words below. A purple ↗ button should appear — click it, enter a tone, and press Enter.</p>
  <div id="editor" contenteditable="true">We was going to the store yesterday with him and her.</div>
</body>
</html>
