<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Humanizer</title>
    <link rel="stylesheet" href="popup.css" />
    <script src="popup.js" defer></script>
  </head>
  <body>
    <header class="popup-header">
      <svg class="popup-logo" viewBox="0 0 28 28" width="28" height="28" aria-hidden="true">
        <circle cx="14" cy="14" r="14" fill="#15C39A" />
        <path fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" d="M8 14l4 4 8-8" />
      </svg>
      <div>
        <h1>Write without mistakes</h1>
        <p class="subtitle">Grammar, spelling, and punctuation — checked locally</p>
      </div>
    </header>

    <div id="status" class="status">Checking server…</div>

    <div class="row">
      <label for="enabled-toggle">Check writing while I type</label>
      <input type="checkbox" id="enabled-toggle" checked />
    </div>

    <ul class="legend">
      <li>
        <span class="swatch swatch-correctness" aria-hidden="true"></span>
        Correctness — wavy red underline on mistakes
      </li>
    </ul>

    <p class="hint">
      Type in any text field — mistakes show red underlines. Click an underline for suggestions.
      Start the server with <code>./start_server.sh</code>.
    </p>
  </body>
</html>
